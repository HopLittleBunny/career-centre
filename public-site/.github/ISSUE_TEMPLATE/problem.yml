name: Product problem
description: Report a Career Centre workflow issue without sharing personal career data.
title: "[Problem] "
body:
  - type: markdown
    attributes:
      value: |
        Do not include a CV, name, address, phone number, email, work-right document, private employer material, account detail or unredacted screenshot.
  - type: dropdown
    id: workflow
    attributes:
      label: Workflow
      description: Which part of Career Centre had the problem?
      options:
        - Setup and readiness receipt
        - Role search
        - Role assessment
        - CV or cover letter
        - Reference CV formatting
        - Career Passport or application tracking
        - Scheduled alert
        - Interview preparation
        - Installation
    validations:
      required: true
  - type: dropdown
    id: surface
    attributes:
      label: ChatGPT surface
      options:
        - ChatGPT web
        - ChatGPT desktop
        - ChatGPT mobile
        - Other or unknown
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected result
      description: Describe the result you expected without including personal data.
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual result
      description: Describe what happened. Redact names, employers and role details if needed.
    validations:
      required: true
  - type: input
    id: date
    attributes:
      label: Approximate date
      placeholder: 2026-07-14
  - type: checkboxes
    id: privacy
    attributes:
      label: Privacy confirmation
      options:
        - label: I removed CV content, personal data, private employer material and account information.
          required: true
        - label: I understand this report will be public.
          required: true
