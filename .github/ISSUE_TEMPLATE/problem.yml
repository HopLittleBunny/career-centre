name: Product problem
description: Report a Career Centre workflow issue without sharing personal career data.
title: "[Problem]: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: Thanks for helping improve Career Centre. Do not attach a real CV, cover letter, application, address, phone number or other personal career data.
  - type: dropdown
    id: area
    attributes:
      label: Product area
      description: Which part of Career Centre had the problem?
      options:
        - Installation
        - CV reading or setup
        - Role search or assessment
        - Word CV or cover letter
        - Career Passport or application history
        - Scheduled role alert
        - Public website
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
      description: Describe what you expected using fictional or redacted examples only.
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: What happened
      description: Describe the issue without pasting real career data.
    validations:
      required: true
  - type: input
    id: surface
    attributes:
      label: ChatGPT plan and browser
      placeholder: Example: Plus, Chrome on macOS
  - type: checkboxes
    id: privacy
    attributes:
      label: Privacy check
      options:
        - label: I removed personal career data and confidential job-application information.
          required: true
